<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebClip全屏描述文件生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            background: #f5f7fa;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #007aff;
        }
        #iconPreview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            margin-top: 10px;
            display: none;
            border: 2px solid #eee;
        }
        .generate-btn {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .tip {
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍎 WebClip 全屏应用描述文件</h1>

    <div class="form-group">
        <label>桌面名称</label>
        <input type="text" id="payloadName" value="星期五">
    </div>

    <div class="form-group">
        <label>目标网址（必须带https://）</label>
        <input type="url" id="webUrl" placeholder="https://">
    </div>

    <div class="form-group">
        <label>标识符</label>
        <input type="text" id="payloadID" value="com.webclip.friday">
    </div>

    <div class="form-group">
        <label>上传图标（建议512x512方形png）</label>
        <input type="file" id="iconFile" accept="image/png,image/jpeg">
        < img id="iconPreview">
        <div class="tip">图标必须小于64KB，过大容易安装失败</div>
    </div>

    <button class="generate-btn" onclick="generateMobileConfig()">生成 .mobileconfig</button>
</div>

<script>
let iconBase64 = '';

document.getElementById('iconFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
        iconBase64 = reader.result.split(',')[1];
        document.getElementById('iconPreview').src = reader.result;
        document.getElementById('iconPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
});

function generateMobileConfig() {
    const name = document.getElementById('payloadName').value || 'WebApp';
    const url = document.getElementById('webUrl').value;
    const id = document.getElementById('payloadID').value || 'com.webclip.app';

    if (!url) {
        alert('请填写网址！');
        return;
    }

    let plist = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>PayloadContent</key>
	<array>
		<dict>
			<key>FullScreen</key>
			<true/>
			<key>Icon</key>`;

    if (iconBase64) {
        plist += `
			<data>
${iconBase64}
			</data>`;
    }

    plist += `
			<key>IsRemovable</key>
			<true/>
			<key>Label</key>
			<string>${name}</string>
			<key>PayloadDescription</key>
			<string>WebApp</string>
			<key>PayloadDisplayName</key>
			<string>${name}</string>
			<key>PayloadIdentifier</key>
			<string>${id}.webclip</string>
			<key>PayloadType</key>
			<string>com.apple.webClip.managed</string>
			<key>PayloadUUID</key>
			<string>${generateUUID()}</string>
			<key>PayloadVersion</key>
			<integer>1</integer>
			<key>Precomposed</key>
			<true/>
			<key>URL</key>
			<string>${url}</string>
		</dict>
	</array>
	<key>PayloadDescription</key>
	<string>由WebClip生成器创建</string>
	<key>PayloadDisplayName</key>
	<string>${name}</string>
	<key>PayloadIdentifier</key>
	<string>${id}</string>
	<key>PayloadType</key>
	<string>Configuration</string>
	<key>PayloadUUID</key>
	<string>${generateUUID()}</string>
	<key>PayloadVersion</key>
	<integer>1</integer>
</dict>
</plist>`;

    const blob = new Blob([plist], { type: 'application/x-apple-aspen-config' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = name + '.mobileconfig';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function generateUUID() {
    let d = new Date().getTime();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = (d + Math.random() * 16) % 16 | 0;
        d = Math.floor(d / 16);
        return (c == 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}
</script>
</body>
</html>
